<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#060D1C"/>

  <!-- R monogram — bold, centered -->
  <text
    x="16" y="23"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', Arial, Helvetica, sans-serif"
    font-weight="900"
    font-size="21"
    fill="#D8E8F8"
  >R</text>

  <!-- Circuit accent: horizontal PCB trace + node (bottom-right) -->
  <line x1="21" y1="27.5" x2="25" y2="27.5" stroke="#3B9FFF" stroke-width="1.2" stroke-linecap="round" opacity="0.85"/>
  <circle cx="26.5" cy="27.5" r="1.5" fill="#3B9FFF" opacity="0.9"/>
</svg>
